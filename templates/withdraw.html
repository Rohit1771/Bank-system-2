{% extends "base.html" %}
{% block title %}Withdraw — Rohit Bank{% endblock %}
{% block back %}<a href="{{ url_for('dashboard') }}">← Back to dashboard</a>{% endblock %}

{% block content %}
<div class="card card--narrow">
  <p class="eyebrow">Take out funds</p>
  <h1 class="page-title">Withdraw</h1>
  <p class="page-sub">Move money out of your available balance.</p>

  <form action="/withdraw" method="POST">
    <div class="form-field">
      <label for="amount">Amount (₹)</label>
      <input type="number" id="amount" name="amount" placeholder="Enter amount to withdraw" min="1" required>
    </div>
    <button type="submit" class="btn btn-block">Withdraw</button>
  </form>
</div>
{% endblock %}
