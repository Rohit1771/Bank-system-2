{% extends "base.html" %}
{% block title %}Open an account — Rohit Bank{% endblock %}

{% block content %}
<div class="card card--narrow">
  <p class="eyebrow">New account</p>
  <h1 class="page-title">Open an account</h1>
  <p class="page-sub">Takes under a minute — no paperwork, just a ledger entry.</p>

  <form action="/register" method="POST">
    <div class="form-field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Choose a username" required>
    </div>
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="form-field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Create a password" required>
    </div>
    <div class="form-field">
      <label for="confirm_password">Confirm password</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
    </div>
    <button type="submit" class="btn btn-block">Open account</button>
  </form>

  <div class="form-foot">
    <span>Already banking with us?</span>
    <a href="/login">Log in</a>
  </div>
</div>
{% endblock %}
