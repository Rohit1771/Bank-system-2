{% extends "base.html" %}
{% block title %}Transfer — Rohit Bank{% endblock %}
{% block back %}<a href="{{ url_for('dashboard') }}">← Back to dashboard</a>{% endblock %}

{% block content %}
<div class="card card--narrow">
  <p class="eyebrow">Send money</p>
  <h1 class="page-title">Transfer</h1>
  <p class="page-sub">Send funds to another account holder.</p>

  <form action="/transfer" method="POST">
    <div class="form-field">
      <label for="receiver_username">Receiver username</label>
      <input type="text" id="receiver_username" name="receiver_username" placeholder="Enter receiver username" required>
    </div>
    <div class="form-field">
      <label for="amount">Amount (₹)</label>
      <input type="number" id="amount" name="amount" placeholder="Enter amount to transfer" min="1" required>
    </div>
    <button type="submit" class="btn btn-block">Transfer</button>
  </form>
</div>
{% endblock %}
