<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History</title>
</head>
<body>
    <h1>Profile</h1>
    <table border="1" cellpadding="10">
        <tr>
            <th>username</th>
            <td>{{ user["username"] }}</td>
        </tr>
        <tr>

            <th>email</th>
            <td>{{ user["email"] }}</td>
        </tr>
        <tr>    

            <th>balance</th>
            <td>${{ "%.2f"|format(user["balance"]) }}</td>
        </tr>
    </table>
    <br>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
