{% extends "base.html" %}
{% block title %}Change password — Rohit Bank{% endblock %}
{% block back %}<a href="{{ url_for('dashboard') }}">← Back to dashboard</a>{% endblock %}

{% block content %}
<div class="card card--narrow">
  <p class="eyebrow">Security</p>
  <h1 class="page-title">Change password</h1>
  <p class="page-sub">Verify your current password to set a new one.</p>

  <form action="/change_password" method="POST">
    <div class="form-field">
      <label for="old_password">Old password</label>
      <input type="password" id="old_password" name="old_password" placeholder="Old password" required>
    </div>
    <div class="form-field">
      <label for="new_password">New password</label>
      <input type="password" id="new_password" name="new_password" placeholder="New password" required>
    </div>
    <div class="form-field">
      <label for="confirm_password">Confirm new password</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
    </div>
    <button type="submit" class="btn btn-block">Change password</button>
  </form>
</div>
{% endblock %}
