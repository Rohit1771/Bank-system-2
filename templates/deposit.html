{% extends "base.html" %}
{% block title %}Deposit — Rohit Bank{% endblock %}
{% block back %}<a href="{{ url_for('dashboard') }}">← Back to dashboard</a>{% endblock %}

{% block content %}
<div class="card card--narrow">
  <p class="eyebrow">Add funds</p>
  <h1 class="page-title">Deposit</h1>
  <p class="page-sub">Add money to your available balance.</p>

  <form action="/deposit" method="POST">
    <div class="form-field">
      <label for="amount">Amount (₹)</label>
      <input type="number" id="amount" name="amount" placeholder="Enter amount to deposit" min="1" required>
    </div>
    <button type="submit" class="btn btn-block">Deposit</button>
  </form>
</div>
{% endblock %}
