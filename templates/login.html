{% extends "base.html" %}
{% block title %}Log in — Rohit Bank{% endblock %}

{% block content %}
<div class="card card--narrow">
  <p class="eyebrow">Account access</p>
  <h1 class="page-title">Log in</h1>
  <p class="page-sub">Enter your credentials to open your ledger.</p>

  <form action="/login" method="POST">
    <div class="form-field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="e.g. rohit1771" required>
    </div>
    <div class="form-field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Your password" required>
    </div>
    <button type="submit" class="btn btn-block">Log in</button>
  </form>

  <div class="form-foot">
    <span>New to Rohit Bank?</span>
    <a href="/register">Open an account</a>
  </div>
</div>
{% endblock %}
